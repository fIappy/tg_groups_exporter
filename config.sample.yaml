api_id: "YOUR_API_ID"
api_hash: "YOUR_API_HASH"
phone: "YOUR_PHONE_NUMBER"
session_name: "exporter"
start_date: "2024-01-01"
output_dir: "./tg_export"
download_media: true
max_media_size_mb: 50
video_cover_only: false
